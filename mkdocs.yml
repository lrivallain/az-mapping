site_name: az-scout
site_description: Scout Azure regions for VM availability, zone mappings, pricing, spot scores, and quota — then plan deployments with confidence.
site_url: https://lrivallain.github.io/az-scout/
repo_url: https://github.com/lrivallain/az-scout
repo_name: lrivallain/az-scout
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/favicon.svg
  favicon: assets/favicon.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Features: features.md
  - MCP Server: mcp.md
  - API Reference: api.md
  - Plugins:
    - plugins/index.md
    - Scaffold Reference: plugins/scaffold.md
  - Scoring: scoring.md
  - Prompt Examples: prompts.md
  - Changelog: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/lrivallain/az-scout
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/az-scout/

docs_dir: docs
site_dir: site
exclude_docs: |
  SCORING.md
  PROMPTS.md
  plugins.md
  plugin-scaffold/**
